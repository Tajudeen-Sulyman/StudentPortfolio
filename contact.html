<!-- Contact Section -->
<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center text-primary mb-4">
                        Contact Me
                    </h2>

                    <form id="contactForm">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                placeholder="Enter your full name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Enter your email address">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                                type="text"
                                id="phone"
                                class="form-control"
                                placeholder="Enter your phone number">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Message
                            </label>

                            <textarea
                                id="message"
                                rows="5"
                                class="form-control"
                                placeholder="Write your message"></textarea>

                        </div>

                        <div class="d-grid">

                            <button
                                type="submit"
                                class="btn btn-primary">

                                <i class="bi bi-send-fill"></i>
                                Send Message

                            </button>

                        </div>

                    </form>

                    <p id="result" class="text-center mt-3 fw-bold"></p>

                </div>

            </div>

        </div>

    </div>

</div>
